<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Net Audit - Procesando</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; }
        .spinner-border { width: 4rem; height: 4rem; }
        h2 { color: #58a6ff; }
    </style>
</head>
<body>
<div class="container py-5 text-center">
    <div style="font-size:3rem">🛡️</div>
    <h2 class="mt-3">Analizando tráfico de red...</h2>
    <p class="text-secondary">El modelo MLP y Random Forest están procesando tu captura.<br>Esto puede tardar unos segundos.</p>
    <div class="spinner-border text-info mt-4" role="status"></div>
    <p class="mt-3 text-secondary small" id="mensaje">Iniciando análisis...</p>
</div>

<script>
    const taskId = "{{ task_id }}";
    const mensajes = [
        "Preprocesando datos...",
        "Entrenando modelo MLP...",
        "Entrenando Random Forest...",
        "Generando gráficas...",
        "Calculando métricas ROC...",
        "Casi listo..."
    ];
    let i = 0;

    const intervalo = setInterval(() => {
        document.getElementById('mensaje').textContent = mensajes[i % mensajes.length];
        i++;

        fetch(`/estado/${taskId}`)
            .then(r => r.json())
            .then(data => {
                if (data.estado === 'listo') {
                    clearInterval(intervalo);
                    window.location.href = `/resultados/${taskId}`;
                } else if (data.estado === 'error') {
                    clearInterval(intervalo);
                    document.getElementById('mensaje').textContent = 'Error en el análisis.';
                }
            });
    }, 2000);
</script>
</body>
</html>
